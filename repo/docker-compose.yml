version: '3.8'

# IMPORTANT: The values below are development defaults only.
# Before deploying to production you MUST supply externally managed secrets for
# JWT_SECRET, ENCRYPTION_KEY, MYSQL_ROOT_PASSWORD, MYSQL_PASSWORD, and DB_PASSWORD
# via environment variables or a secrets manager — never commit real secrets here.

services:
  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --log-bin=mysql-bin --server-id=1 --binlog-format=ROW
    environment:
      # DEV default — replace with a strong random value in production
      MYSQL_ROOT_PASSWORD: dev-root-change-in-production
      MYSQL_DATABASE: civicforum
      MYSQL_USER: civicforum
      # DEV default — replace with a strong random value in production
      MYSQL_PASSWORD: dev-civicforum-change-in-production
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pdev-root-change-in-production"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: mysql://civicforum:dev-civicforum-change-in-production@mysql:3306/civicforum
      # DEV default — must be >= 32 chars; replace with a secret random value in production
      JWT_SECRET: dev-jwt-secret-replace-before-production-use-0000000000000000
      # JWT expiry in seconds (86400 = 24 hours)
      JWT_EXPIRES_IN: 86400
      BCRYPT_ROUNDS: 12
      # DEV default — must be exactly 64 hex chars; replace with a secret random value in production
      ENCRYPTION_KEY: deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef
      RATE_LIMIT_WRITE: 120
      RATE_LIMIT_READ: 600
      RATE_LIMIT_WINDOW_MS: 60000
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: 14
      LOG_LEVEL: info
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: civicforum
      # DEV default — match MYSQL_PASSWORD above; replace in production
      DB_PASSWORD: dev-civicforum-change-in-production
      DB_NAME: civicforum
      # DEV default — used only during database seeding; replace with a strong value in production
      SEED_ADMIN_PASSWORD: Admin12345678!
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - backups:/backups
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

volumes:
  mysql_data:
  backups:

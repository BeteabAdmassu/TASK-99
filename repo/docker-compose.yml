version: '3.8'

services:
  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --log-bin=mysql-bin --server-id=1 --binlog-format=ROW
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: civicforum
      MYSQL_USER: civicforum
      MYSQL_PASSWORD: civicforum_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: mysql://civicforum:civicforum_pass@mysql:3306/civicforum
      JWT_SECRET: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
      JWT_EXPIRES_IN: 24h
      BCRYPT_ROUNDS: 12
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      RATE_LIMIT_WRITE: 120
      RATE_LIMIT_READ: 600
      RATE_LIMIT_WINDOW_MS: 60000
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: 14
      LOG_LEVEL: info
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: civicforum
      DB_PASSWORD: civicforum_pass
      DB_NAME: civicforum
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - backups:/backups
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

volumes:
  mysql_data:
  backups:
